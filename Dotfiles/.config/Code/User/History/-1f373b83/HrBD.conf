# CONFIGURACIÓN GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# EL FONDO (Background)
background {
    monitor =
    # Intentamos cargar el fondo actual. Si falla, usa un color sólido.
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 para no tener desenfoque
    blur_size = 7
}

# EL CUADRO DE TEXTO (Donde escribes la contraseña)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33 
    dots_spacing = 0.15 
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Escribe tu contraseña...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# EL RELOJ
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# MENSAJE DE BIENVENIDA
label {
    monitor =
    text = Hola, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}