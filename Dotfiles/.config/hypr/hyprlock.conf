# --- Sourcing colors generated by wallust for a consistent theme ---
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

# --- Variable for scripts location ---
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1               # Time (seconds) before the password is required after lock
    fractional_scaling = 1  # Ensures text remains sharp on laptop displays (0, 1, or 2)
    immediate_render = true # Forces the lockscreen to render immediately to avoid black flickering
}

background {
    monitor =               # Leave empty to apply this background to all monitors
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current # Path to the current wallpaper
    color = rgb(0,0,0)      # Fallback color while the image is loading
    
    # Blur effects (Adjusted for laptop performance)
    blur_size = 3           # Radius of the blur effect
    blur_passes = 2         # Number of blur iterations (higher = smoother but heavier on GPU)
    noise = 0.0117          # Adds a subtle grain effect to the blur
    contrast = 1.3000       # Increases color vividness
    brightness = 0.8000     # Dims the background for better text readability
    vibrancy = 0.2100       # Boosts color saturation
    vibrancy_darkness = 0.0
}


# --- HOUR (Main Clock) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")" # Updates every second (1000ms) using system date
    color = $color8         # Uses the 8th color from your wallust theme
    font_size = 100         # Reduced size (from 173) to fit smaller laptop screens
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -100      # Horizontal and Vertical offset from the anchor point
    halign = center         # Anchors the element to the horizontal center
    valign = top            # Anchors the element to the top of the screen
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>" # Updates every few hours
    color = $color13
    font_size = 28          # Balanced size for sub-text
    font_family = Victor Mono Bold Italic
    position = 0, -250      # Placed below the clock to avoid overlapping
    halign = center
    valign = top
}

# --- USERNAME ---
label {
    monitor =
    text =   $USER         # Shows an icon followed by your Linux username
    color = $color9
    font_size = 20
    font_family = Victor Mono Bold Oblique
    position = 0, 220       # Positioned above the password box
    halign = center
    valign = bottom         # Anchors to the bottom for a modern look
}

# --- PASSWORD INPUT FIELD ---
input-field {
    monitor =
    size = 250, 50          # Width and Height of the box (adjusted for laptop aspect ratio)
    outline_thickness = 2   # Border thickness
    dots_size = 0.2         # Size of the password dots
    dots_spacing = 0.2      # Space between dots
    dots_center = true      # Centers the dots inside the box
    outer_color = $color8   # Border color
    inner_color = rgba(255, 255, 255, 0.1) # Semi-transparent background for the box
    capslock_color = rgb(255,255,255)      # Color changes when Caps Lock is active
    font_color = $color13   # Color of the text/dots
    fade_on_empty = false   # Keep the box visible even if empty
    font_family = Victor Mono Bold Oblique
    placeholder_text = <i>🔒 Password</i>  # Text shown when empty
    hide_input = false      # Show dots instead of hiding everything
    position = 0, 150       # Centered but raised from the bottom
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 19
    font_family = Victor Mono Bold Oblique
    position = 0, 53
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $color8
    font_size = 32
    font_family = Victor Mono Bold Oblique
    position = 0, 0
    halign = right
    valign = bottom
}

# battery information
label {
    monitor =
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $color8
    font_size = 21
    font_family = Victor Mono Bold Oblique
    position = 0, 40
    halign = right
    valign = bottom
}

# weather edit the scripts for locations
# weather scripts are located in ~/.config/hypr/UserScripts Weather.sh and/or Weather.py
# see https://github.com/JaKooLit/Hyprland-Dots/wiki/TIPS#%EF%B8%8F-weather-app-related-for-waybar-and-hyprlock
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat  "$HOME/.cache/.weather_cache"
    color = $color8
    font_size = 19
    font_family = Victor Mono Bold Oblique
    position = 50, 0
    halign = left
    valign = bottom
}
