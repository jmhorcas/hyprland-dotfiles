###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# Standard
bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, Q, Close active window, killactive,
bindd = CTRL ALT, Delete, Exit / Power menu, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindd = $mainMod, E, File manager, exec, $fileManager
bindd = $mainMod, V, Toggle floating mode, togglefloating,
bindd = $mainMod, R, App launcher, exec, $menu
bindd = $mainMod, P, Pseudo-tiling, pseudo, # dwindle
bindd = $mainMod, J, Toggle split, layoutmsg, togglesplit # dwindle
bindd = $mainMod, F, Fullscreen, fullscreen,
bindd = $mainMod, L, Lock screen, exec, hyprlock

# Extras
bindd = $mainMod, H, Help, exec, ~/.config/hypr/scripts/help.sh
bindd = $mainMod, B, Web search, exec, ~/.config/hypr/scripts/web_search.sh
bindd = $mainMod CONTROL, S, Settings, exec, ~/.config/hypr/scripts/settings_menu.sh

# Move focus with mainMod + arrow keys
bindd = $mainMod, left, Focus left, movefocus, l
bindd = $mainMod, right, Focus right, movefocus, r
bindd = $mainMod, up, Focus up, movefocus, u
bindd = $mainMod, down, Focus down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod, 1, Workspace 1, workspace, 1
bindd = $mainMod, 2, Workspace 2, workspace, 2
bindd = $mainMod, 3, Workspace 3, workspace, 3
bindd = $mainMod, 4, Workspace 4, workspace, 4
bindd = $mainMod, 5, Workspace 5, workspace, 5
bindd = $mainMod, 6, Workspace 6, workspace, 6
bindd = $mainMod, 7, Workspace 7, workspace, 7
bindd = $mainMod, 8, Workspace 8, workspace, 8
bindd = $mainMod, 9, Workspace 9, workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move to workspace 10, movetoworkspace, 10

# Example special workspace (scratchpad)
bindd = $mainMod, S, Toggle special workspace, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move to special workspace, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = $mainMod, mouse:272, Move window, movewindow  # NOTE: mouse:272 = left click
bindmd = $mainMod, mouse:273, Resize window, resizewindow  # NOTE: mouse:273 = right click

# Laptop multimedia keys for volume and LCD brightness
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindeld = ,XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = ,XF86AudioMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = ,XF86AudioMicMute, Toggle mic mute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, brightnessctl -e4 -n2 set 5%+
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# --- Laptop & Media Keybinds ---
# These use 'binde' (e for repeat) so you can hold the button down

# Monitor Brightness
binde = , xf86MonBrightnessDown, exec, brightnessctl set 5%- # Decrease 5%
binde = , xf86MonBrightnessUp, exec, brightnessctl set +5%   # Increase 5%

# Keyboard Brightness
binde = , xf86KbdBrightnessDown, exec, brightnessctl set 5%- # Decrease 5%
binde = , xf86KbdBrightnessUp, exec, brightnessctl set +5%   # Increase 5%

# Touchpad Toggle (Only if your laptop has a dedicated key)
bind = , xf86TouchpadToggle, exec, $scriptsDir/TouchPad.sh # toggle touchpad on/off

# Screenshot keybindings NOTE: You may need to press Fn key as well
bindd = , Print, Screenshot now, exec, ~/.config/hypr/scripts/ScreenShot.sh --now
bindd = $mainMod, Print, Screenshot (area), exec, ~/.config/hypr/scripts/ScreenShot.sh --area
bindd = CTRL, Print, Screenshot in 5s, exec, ~/.config/hypr/scripts/ScreenShot.sh --in5
bindd = $mainMod CTRL, Print, Screenshot in 10s, exec, ~/.config/hypr/scripts/ScreenShot.sh --in10
bindd = ALT, Print, Screenshot active window, exec, ~/.config/hypr/scripts/ScreenShot.sh --active
bindd = $mainMod SHIFT, Print, Screenshot (area) editable, exec, ~/.config/hypr/scripts/ScreenShot.sh --swappy

