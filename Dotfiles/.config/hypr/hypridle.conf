general {
    lock_cmd = pidof hyprlock || hyprlock       # Comando para bloquear
    before_sleep_cmd = loginctl lock-session    # Bloquear antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # Encender pantalla al despertar
}

# PASO 1: Bloquear la pantalla (a los 5 minutos)
listener {
    timeout = 300                                # 300 segundos = 5 min
    on-timeout = loginctl lock-session           # Llama al lock_cmd definido arriba
}

# PASO 2: Apagar el monitor (a los 6 minutos)
listener {
    timeout = 360                                # 360 segundos = 6 min
    on-timeout = hyprctl dispatch dpms off       # Apaga el monitor
    on-resume = hyprctl dispatch dpms on         # Lo enciende al mover el ratón
}

