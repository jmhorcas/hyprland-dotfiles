# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true           # Master switch for pseudotiling (tiled windows with floating size)
    preserve_split = true       # Keeps the split direction when closing/opening windows
    special_scale_factor = 0.8  # Scale of windows in the "Special Workspace" (scratchpad)
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true       # Disables the Hyprland logo on the background
    disable_splash_rendering = true    # Disables the startup splash messages
    vfr = true                         # Variable Frame Rate: strictly improves battery/CPU usage
    vrr = 2                            # Variable Refresh Rate (0: off, 1: on, 2: fullscreen only)
    mouse_move_enables_dpms = true     # Wakes up monitor when moving the mouse
    key_press_enables_dpms = true      # Wakes up monitor when pressing a key
    focus_on_activate = false          # Prevents apps from auto-focusing via notifications
    initial_workspace_tracking = 0     # Prevents windows from jumping monitors on launch
    allow_session_lock_restore = true  # Vital: allows session recovery after lock/suspend
}

binds {
    workspace_back_and_forth = true    # Switching to current workspace goes to previous one
    allow_workspace_cycles = true      # Enables cycling through workspaces
}

xwayland {
    force_zero_scaling = true          # Prevents blur in legacy X11 apps when using HiDPI scaling
}

cursor {
    sync_gsettings_theme = true     # Syncs cursor theme with GTK/GNOME settings
    no_hardware_cursors = 2         # Best compatibility for NVIDIA/Intel to prevent invisible cursors
    enable_hyprcursor = true        # Enables Hyprland's native modern cursor engine
    warp_on_change_workspace = 2    # Keeps cursor in place when switching workspaces
    no_warps = true                 # Prevents the system from forcing cursor movements
}
