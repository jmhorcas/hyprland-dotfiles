#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

# Toolkit Backends (Fuerza a las apps a usar Wayland)
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland

# XDG (Necesario para que funcionen los portales y compartir pantalla)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Cursores (Para que el tamaño sea consistente)
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Apps específicas (Indispensable hoy en día)
env = MOZ_ENABLE_WAYLAND,1        # Firefox nativo
env = ELECTRON_OZONE_PLATFORM_HINT,auto  # VS Code, Discord, etc. nativos

# Temas (Para que las ventanas no parezcan de Windows 95)
env = QT_QPA_PLATFORMTHEME,qt6ct